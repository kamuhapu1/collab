<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <title>Вход в аккаунт</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display&family=Roboto&display=swap');

        body {
            background: #fff5f5;
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            border-radius: 15px;
            max-width: 420px;
            width: 100%;
            padding: 40px 35px;
            box-shadow: 0 8px 25px rgba(220, 20, 60, 0.2);
            background: white;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: "";
            position: absolute;
            top: -50px;
            right: -50px;
            width: 180px;
            height: 180px;
            background: #dc143c;
            border-radius: 50%;
            opacity: 0.15;
            z-index: 0;
        }

        h4 {
            font-family: 'Playfair Display', serif;
            color: #b71c1c;
            font-weight: 700;
            margin-bottom: 35px;
            text-align: center;
            z-index: 1;
            position: relative;
            letter-spacing: 1.2px;
        }

        form {
            position: relative;
            z-index: 1;
        }

        .input-field label {
            color: #b71c1c;
            font-weight: 500;
            font-size: 1rem;
        }

        input[type=text], input[type=password] {
            border-bottom: 2px solid #b71c1c;
            box-shadow: none !important;
            font-size: 1.1rem;
            padding: 6px 0;
            color: #3e3e3e;
        }

        input[type=text]:focus, input[type=password]:focus {
            border-bottom: 2px solid #f44336 !important;
            box-shadow: 0 1px 0 0 #f44336 !important;
        }

        .btn {
            width: 100%;
            margin-top: 30px;
            background: linear-gradient(45deg, #b71c1c, #f44336);
            box-shadow: 0 5px 15px rgba(244, 67, 54, 0.6);
            border-radius: 30px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: linear-gradient(45deg, #f44336, #b71c1c);
            box-shadow: 0 8px 20px rgba(244, 67, 54, 0.8);
        }

        .btn.register-link {
            background: #eee;
            color: #b71c1c;
            box-shadow: none;
            margin-top: 15px;
            border-radius: 30px;
            font-weight: 600;
            display: block;
            text-align: center;
            padding: 10px 0;
            text-decoration: none;
        }

        .btn.register-link:hover {
            background: #f44336;
            color: white;
            box-shadow: 0 5px 15px rgba(244, 67, 54, 0.6);
        }

        .input-field input.invalid {
            border-bottom: 2px solid #f44336 !important;
            box-shadow: 0 1px 0 0 #f44336 !important;
        }
    </style>
</head>
<body>

<div class="card z-depth-4">
    <h4>Вход в аккаунт</h4>

    <form method="post" novalidate>
        {% csrf_token %}
        {{ form.non_field_errors }}

        <div class="input-field">
            {{ form.username.label_tag }}
            {{ form.username }}
            {{ form.username.errors }}
        </div>

        <div class="input-field">
            {{ form.password.label_tag }}
            {{ form.password }}
            {{ form.password.errors }}
        </div>

        <button type="submit" class="waves-effect waves-light btn">
            <i class="material-icons left">login</i>Войти
        </button>
    </form>

    <a href="{% url 'register' %}" class="btn register-link">
        Нет аккаунта? Зарегистрируйся
    </a>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
</body>
</html>
